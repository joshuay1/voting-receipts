name: Deploy public site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check public site
        run: make check

      - name: Publish site to gh-pages
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          cp -a .nojekyll CNAME index.html projects.html outcomes.html info.html assets "$tmp_dir"/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git switch --orphan gh-pages-deploy
          git rm -rf . >/dev/null 2>&1 || true
          cp -a "$tmp_dir"/. .
          rm -rf "$tmp_dir"

          git add .
          git commit -m "Deploy public site from ${GITHUB_SHA}"
          git push --force origin HEAD:gh-pages
